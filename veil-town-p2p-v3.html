<style>
:root{--bg:#101214;--s:#191c1f;--r:#22262a;--line:#363c42;--t:#f5f1e9;--m:#aaa59c;--g:#d8ad59;--b:#73a8dc;--ok:#78ba8f;--red:#df746c;--p:#aa8bd4}*{box-sizing:border-box}html,body{margin:0;min-height:100%;background:radial-gradient(circle at 50% -10%,#302d24,#17191b 35%,var(--bg) 75%);color:var(--t);font:16px/1.5 system-ui,-apple-system,"Noto Sans JP",sans-serif}.hidden{display:none!important}button,input,select{font:inherit}button{min-height:46px;border:1px solid var(--line);border-radius:9px;background:var(--r);color:var(--t);padding:10px 14px;font-weight:800;cursor:pointer}button:focus-visible,input:focus-visible{outline:3px solid rgba(115,168,220,.55);outline-offset:2px}.primary{background:var(--g);border-color:var(--g);color:#17130d}.ghost{background:transparent}.shell{width:min(1180px,100%);margin:auto;padding:22px}.brand{display:flex;align-items:center;gap:12px;margin-bottom:20px}.sigil{width:42px;height:42px;border:1px solid var(--g);border-radius:50%;display:grid;place-items:center;color:var(--g);font:24px Georgia,serif}.brand b{letter-spacing:.16em}.brand small{display:block;color:var(--m)}.net{margin-left:auto;border:1px solid var(--line);border-radius:7px;padding:5px 8px;color:var(--m);font-size:13px}.net.on{color:var(--ok);border-color:#476d53}.panel{background:rgba(25,28,31,.96);border:1px solid var(--line);border-radius:14px;padding:21px;box-shadow:0 18px 55px rgba(0,0,0,.34)}.home{display:grid;grid-template-columns:1.2fr .8fr;gap:18px}.hero h1{font:700 clamp(36px,6vw,65px)/1.02 Georgia,"Noto Serif JP",serif;margin:10px 0 18px}.hero p,.muted{color:var(--m)}.eyebrow{color:var(--g);font-size:12px;letter-spacing:.17em;font-weight:850}.entry{display:grid;gap:13px;align-content:center}.entry label{display:grid;gap:6px;color:var(--m);font-size:13px;font-weight:750}input{width:100%;min-height:46px;background:#111416;color:var(--t);border:1px solid var(--line);border-radius:9px;padding:11px}.notice{padding:11px 13px;border-left:3px solid var(--g);background:rgba(216,173,89,.09);border-radius:5px}.head{display:flex;justify-content:space-between;gap:12px;align-items:center;margin-bottom:14px}.code{font:700 19px monospace;color:var(--g);letter-spacing:.14em}.head-actions,.btnrow,.tabs{display:flex;gap:8px;flex-wrap:wrap}.layout{display:grid;grid-template-columns:minmax(0,1fr) 360px;gap:15px}.stage{min-height:600px}.phase{display:flex;justify-content:space-between;border-bottom:1px solid var(--line);padding-bottom:15px}.phase h2{font:700 29px Georgia,"Noto Serif JP",serif;margin:4px 0}.timer{font:700 31px monospace;color:var(--g)}#body{padding-top:17px}.rail{display:grid;gap:13px;align-content:start}.tabs button{min-height:38px;padding:7px 10px;font-size:13px}.tabs button.on{border-color:var(--g);color:var(--g)}.players{display:grid;gap:8px;margin-top:11px}.player{display:flex;align-items:center;gap:8px;border:1px solid var(--line);border-radius:9px;padding:9px;background:#15181a}.player .name{flex:1}.dot{width:9px;height:9px;border-radius:50%;background:var(--m)}.dot.on{background:var(--ok)}.badge{font-size:11px;border:1px solid var(--line);border-radius:5px;padding:2px 6px;color:var(--m)}.dead{opacity:.45;text-decoration:line-through}.rolecard{border:1px solid var(--line);border-left:4px solid var(--b);border-radius:11px;padding:16px;background:#15181a}.rolecard.impostor{border-left-color:var(--red)}.rolecard.neutral{border-left-color:var(--p)}.rolecard h3{font-size:24px;margin:3px 0}.targets{display:grid;grid-template-columns:repeat(auto-fit,minmax(135px,1fr));gap:8px;margin-top:14px}.target{text-align:left}.target.sel{border-color:var(--g)}.rolelist,.flowlist{display:grid;gap:7px;margin-top:11px;max-height:520px;overflow:auto}.roleitem,.flowitem{border:1px solid var(--line);border-radius:8px;padding:9px;background:#15181a}.roleitem b,.flowitem b{display:block}.roleitem small,.flowitem small{color:var(--m)}.events{max-height:180px;overflow:auto}.event{font-size:13px;color:var(--m);padding:7px 0;border-bottom:1px solid #2a2f33}.toast{position:fixed;left:50%;bottom:22px;transform:translate(-50%,15px);opacity:0;background:#f1ece3;color:#17191b;padding:10px 14px;border-radius:8px;font-weight:800;transition:.18s}.toast.show{opacity:1;transform:translate(-50%,0)}@media(max-width:850px){.shell{padding:14px}.home,.layout{grid-template-columns:1fr}.hero h1{font-size:42px}.stage{min-height:510px}.head{align-items:flex-start}.phase h2{font-size:25px}.rail{grid-template-columns:1fr}.rolelist,.flowlist{max-height:none}}@media(prefers-reduced-motion:reduce){*{transition:none!important}}
</style></head><body><main class="shell"><header class="brand"><div class="sigil">V</div><div><b>VEIL TOWN</b><small>v3 · registration-free P2P</small></div><span id="net" class="net">待機中</span></header>
<section id="home" class="home"><div class="panel hero"><div class="eyebrow">NO ACCOUNT · NO DATABASE</div><h1>URLを送る。<br>すぐに始まる。</h1><p>ペイントツールと同じPeerJS＋WebRTC方式を使った、登録不要・完全無料の招待制ゲームです。通信量は役職、投票、タイマー情報などの軽いJSONだけです。</p><div class="notice">部屋作成者の端末が自動GMを兼ねます。ゲーム中は作成者のページを閉じないでください。</div></div><div class="panel entry"><label>プレイヤー名<input id="name" maxlength="16" placeholder="名前"></label><button id="create" class="primary">部屋を作る</button><label>招待URL／コード<input id="invite" placeholder="URL または ABC123.SECRET"></label><button id="join">参加する</button><button id="resume" class="ghost hidden">前回の部屋へ戻る</button><p class="muted">外部サービスのアカウント登録やAPI設定は不要です。</p></div></section>
<section id="game" class="hidden"><div class="head"><div><div class="eyebrow">PRIVATE ROOM</div><div id="room" class="code">------</div></div><div class="head-actions"><button id="copy">招待URLをコピー</button><button id="leave" class="ghost">退出</button></div></div><div class="layout"><section class="panel stage"><div class="phase"><div><div id="day" class="eyebrow">LOBBY</div><h2 id="phaseTitle">参加者を待っています</h2></div><div id="timer" class="timer">--</div></div><div id="body"></div></section><aside class="rail"><section class="panel"><div class="tabs"><button data-tab="players" class="on">参加者</button><button data-tab="roles">役職一覧</button><button data-tab="flow">ゲームの流れ</button></div><div id="tabPlayers"><div id="players" class="players"></div><div id="lobbyBtns" class="btnrow"><button id="ready">準備OK</button><button id="start" class="primary hidden">開始</button></div></div><div id="tabRoles" class="hidden"><div id="roleList" class="rolelist"></div></div><div id="tabFlow" class="hidden"><div id="flowList" class="flowlist"></div></div></section><section class="panel"><div class="eyebrow">EVENTS</div><div id="events" class="events"></div></section></aside></div></section></main><div id="toast" class="toast"></div>
<script>
'use strict';const $=id=>document.getElementById(id),A='ABCDEFGHJKLMNPQRSTUVWXYZ23456789';
const RD={doctor:['医師','innocent','1人を通常攻撃から守る'],mad:['錯乱者','innocent','能力があると思い込む'],police:['警官','innocent','1人の夜行動を止める'],lookout:['見張り','innocent','対象への訪問人数を知る'],investigator:['調査員','innocent','対象の役職候補を知る'],trapper:['罠師','innocent','対象宅の訪問者を止める'],snitch:['密告者','innocent','一度だけ役職を公開'],provoker:['挑発者','innocent','翌投票で追加票を与える'],tracker:['追跡者','innocent','対象の訪問先を知る'],cleaner:['清掃屋','impostor','死亡者の役職を隠す'],blamer:['濡れ衣師','impostor','死亡者を反逆者に見せる'],survivor:['生存者','neutral','3回まで自分を守る'],serial:['連続殺人犯','neutral','毎夜1人を襲う'],bomber:['爆弾魔','neutral','爆弾を仕掛ける'],thief:['怪盗','neutral','対象の役職を奪う'],haunter:['亡霊','neutral','追放時に印の相手を道連れ'],sorcerer:['魔術師','neutral','役職予言で防御不能攻撃']};
const FLOW=[['ロビー','参加・準備・役職構成確認'],['町長選挙','最初の昼に町長を選ぶ。町長票は2票'],['夜','各自が秘密の能力を選ぶ'],['夜明け','死亡・防御・調査結果を確認'],['議論','情報交換と推理'],['追放投票','最多票の1人を追放'],['勝敗判定','条件未達なら次の夜へ']];
const S={host:false,peer:null,conn:null,conns:new Map(),state:null,private:null,code:'',secret:'',device:getDevice(),reconnecting:false,lastTick:0};
function getDevice(){let x=localStorage.getItem('vt3_device');if(!x){x=crypto.randomUUID?crypto.randomUUID():Date.now().toString(36)+Math.random().toString(36).slice(2);localStorage.setItem('vt3_device',x)}return x}function rnd(n){let s='',a=new Uint32Array(n);crypto.getRandomValues(a);a.forEach(v=>s+=A[v%A.length]);return s}function hash(s){let h=2166136261;for(const c of s){h^=c.charCodeAt(0);h=Math.imul(h,16777619)}return(h>>>0).toString(36)}function hostId(){return'vt3-'+S.code.toLowerCase()+'-'+hash(S.secret)}function parse(v){v=(v||'').trim();if(v.includes('#'))v=v.split('#').pop();let i=v.indexOf('.');return i>0?{code:v.slice(0,i).toUpperCase(),secret:v.slice(i+1)}:null}function url(){return location.origin+location.pathname+'#'+S.code+'.'+S.secret}function esc(v){return String(v??'').replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot',"'":'&#39;'}[c]))}function toast(m){$('toast').textContent=m;$('toast').classList.add('show');clearTimeout(toast.t);toast.t=setTimeout(()=>$('toast').classList.remove('show'),2200)}function setNet(t,on){$('net').textContent=t;$('net').classList.toggle('on',!!on)}
function base(){return{phase:'lobby',day:0,ends:0,players:{},roles:{},actions:{},votes:{},events:[],mayor:null,winner:null,version:1}}function pub(){let x=structuredClone(S.state);delete x.roles;delete x.actions;return x}function persist(){if(S.host)localStorage.setItem('vt3_host_'+S.code,JSON.stringify({secret:S.secret,state:S.state}));localStorage.setItem('vt3_session',JSON.stringify({host:S.host,code:S.code,secret:S.secret,name:$('name').value.trim()}))}
function send(c,m){try{if(c?.open)c.send(m)}catch(e){}}function personal(id){return{t:'state',state:pub(),private:S.state.roles[id]||null,serverNow:Date.now()}}function sync(){if(!S.host)return;for(const[id,c]of S.conns)send(c,personal(id));S.private=S.state.roles[S.device]||null;persist();render()}
function create(){let name=$('name').value.trim();if(!name)return toast('名前を入力してください');if(!window.Peer)return toast('通信ライブラリを読み込めません');S.host=true;S.code=rnd(6);S.secret=rnd(20);S.state=base();S.state.players[S.device]={id:S.device,name,ready:false,alive:true,online:true,lastSeen:Date.now(),revealed:null};location.hash=S.code+'.'+S.secret;open();startHost();persist()}
function startHost(){setNet('部屋を準備中',false);S.peer=new Peer(hostId(),{debug:1,config:{iceServers:[{urls:'stun:stun.l.google.com:19302'},{urls:'stun:stun1.l.google.com:19302'}]}});S.peer.on('open',()=>{setNet('部屋を公開中',true);sync()});S.peer.on('connection',c=>{let bound=null;c.on('data',m=>{if(m.t==='hello'){if(m.secret!==S.secret)return c.close();let id=m.deviceId;if(!S.state.players[id]){if(S.state.phase!=='lobby'||Object.keys(S.state.players).length>=12)return send(c,{t:'reject',message:'参加できません'});S.state.players[id]={id,name:String(m.name||'Player').slice(0,16),ready:false,alive:true,online:true,lastSeen:Date.now(),revealed:null};event(S.state.players[id].name+' が参加しました')}else{S.state.players[id].name=String(m.name||S.state.players[id].name).slice(0,16);S.state.players[id].online=true;S.state.players[id].lastSeen=Date.now()}bound=id;let old=S.conns.get(id);if(old&&old!==c)old.close();S.conns.set(id,c);send(c,personal(id));sync()}else if(bound&&m.t==='intent')intent(bound,m.data)});c.on('close',()=>{if(bound&&S.conns.get(bound)===c){S.conns.delete(bound);if(S.state.players[bound])S.state.players[bound].online=false;sync()}})});S.peer.on('error',e=>{setNet('接続エラー',false);toast(e.type==='unavailable-id'?'同じ部屋が既に開いています':'通信エラー: '+e.type)});setInterval(hostTick,250)}
function joinRoom(){let name=$('name').value.trim(),i=parse($('invite').value||location.hash.slice(1));if(!name)return toast('名前を入力してください');if(!i)return toast('招待URLを確認してください');S.host=false;S.code=i.code;S.secret=i.secret;location.hash=S.code+'.'+S.secret;open();connectGuest();persist()}
function connectGuest(){if(S.reconnecting||S.conn?.open)return;S.reconnecting=true;setNet('接続中',false);if(!S.peer){S.peer=new Peer(undefined,{debug:1,config:{iceServers:[{urls:'stun:stun.l.google.com:19302'},{urls:'stun:stun1.l.google.com:19302'}]}});S.peer.on('open',()=>{S.reconnecting=false;dial()});S.peer.on('error',()=>{S.reconnecting=false;setTimeout(connectGuest,2500)})}else{S.reconnecting=false;dial()}}function dial(){let c=S.peer.connect(hostId(),{reliable:true});S.conn=c;c.on('open',()=>{setNet('接続済み',true);send(c,{t:'hello',deviceId:S.device,name:$('name').value.trim()||'Player',secret:S.secret})});c.on('data',m=>{if(m.t==='state'){S.state=m.state;S.private=m.private;render()}if(m.t==='reject'){toast(m.message);leave()}});c.on('close',()=>{setNet('再接続中',false);setTimeout(connectGuest,2000)});c.on('error',()=>{setNet('再接続中',false);setTimeout(connectGuest,2000)})}
function open(){$('home').classList.add('hidden');$('game').classList.remove('hidden');$('room').textContent=S.code;$('start').classList.toggle('hidden',!S.host);renderRoles();renderFlow();setInterval(renderTimer,250)}function event(m){S.state.events.push({id:Date.now()+Math.random(),message:m});if(S.state.events.length>40)S.state.events.shift()}
function intent(id,m){if(!S.host)return send(S.conn,{t:'intent',data:m});let p=S.state.players[id];if(!p)return;if(m.type==='ready'&&S.state.phase==='lobby')p.ready=!p.ready;if(m.type==='start'&&id===S.device)startGame();if(m.type==='vote'&&['mayor','vote'].includes(S.state.phase)&&p.alive)S.state.votes[id]=m.target;if(m.type==='action'&&S.state.phase==='night'&&p.alive)S.state.actions[id]=m.action;S.state.version++;sync()}
function deck(n){let a=[],imp=Math.max(1,Math.floor(n/4)),neu=n>=6?1:0,good=['doctor','mad','police','lookout','investigator','trapper','snitch','provoker','tracker'];for(let i=0;i<imp;i++)a.push(i%2?'blamer':'cleaner');if(neu)a.push(['survivor','serial','bomber','thief','haunter','sorcerer'][Math.floor(Math.random()*6)]);while(a.length<n)a.push(good[(a.length-imp-neu)%good.length]);for(let i=a.length-1;i;i--){let j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]]}return a}function faction(role){if(['cleaner','blamer'].includes(role))return'impostor';if(['survivor','serial','bomber','thief','haunter','sorcerer'].includes(role))return'neutral';return'innocent'}
function startGame(){let ps=Object.values(S.state.players);if(ps.length<4)return toast('4人以上必要です');if(ps.some(p=>!p.ready&&p.id!==S.device))return toast('準備できていない人がいます');let d=deck(ps.length);S.state.roles={};ps.forEach((p,i)=>S.state.roles[p.id]={role:d[i],faction:faction(d[i]),uses:d[i]==='survivor'?3:(['snitch','provoker'].includes(d[i])?1:99),notes:[]});S.state.phase='mayor';S.state.day=1;S.state.ends=Date.now()+45000;S.state.votes={};event('町長選挙が始まりました');sync()}
function hostTick(){if(!S.host||!S.state||!S.state.ends||['lobby','end'].includes(S.state.phase))return;if(Date.now()>=S.state.ends&&Date.now()-S.lastTick>500){S.lastTick=Date.now();advance()}}function topVote(){let t={};for(const[id,to]of Object.entries(S.state.votes)){let p=S.state.players[id];if(p?.alive)t[to]=(t[to]||0)+(id===S.state.mayor?2:1)}let a=Object.entries(t).sort((x,y)=>y[1]-x[1]);return a.length&&(!a[1]||a[0][1]>a[1][1])?a[0][0]:null}
function advance(){let s=S.state;if(s.phase==='mayor'){s.mayor=topVote();event((s.players[s.mayor]?.name||'誰も')+' が町長になりました');night()}else if(s.phase==='night'){resolveNight();s.phase='dawn';s.ends=Date.now()+12000}else if(s.phase==='dawn'){if(win())return;s.phase='discussion';s.ends=Date.now()+90000}else if(s.phase==='discussion'){s.phase='vote';s.votes={};s.ends=Date.now()+45000}else if(s.phase==='vote'){let x=topVote();if(x&&s.players[x]?.alive){s.players[x].alive=false;s.players[x].revealed=RD[s.roles[x].role][0];event(s.players[x].name+' が追放されました')}if(win())return;s.day++;night()}s.version++;sync()}function night(){S.state.phase='night';S.state.actions={};S.state.votes={};S.state.ends=Date.now()+45000;event(S.state.day+'日目の夜になりました')}
function resolveNight(){let s=S.state,block=new Set(),prot=new Set(),kills=[];for(const[id,a]of Object.entries(s.actions)){let r=s.roles[id];if(r?.role==='police'&&a.target)block.add(a.target)}for(const[id,a]of Object.entries(s.actions)){let r=s.roles[id],p=s.players[id];if(!r||!p?.alive||block.has(id))continue;if(r.role==='doctor'&&a.target)prot.add(a.target);if(r.role==='survivor'&&r.uses>0){prot.add(id);r.uses--}if(['serial','thief'].includes(r.role)&&a.target)kills.push(a.target);if(r.faction==='impostor'&&a.mode==='factionKill'&&a.target)kills.push(a.target);if(r.role==='investigator'&&a.target)r.notes.push('調査候補: '+RD[s.roles[a.target]?.role]?.[0]);if(r.role==='tracker'&&a.target)r.notes.push('追跡を実行しました')}for(const x of new Set(kills)){if(s.players[x]?.alive&&!prot.has(x)){s.players[x].alive=false;s.players[x].revealed=RD[s.roles[x].role][0];event(s.players[x].name+' が夜に倒れました')}}}function win(){let alive=Object.values(S.state.players).filter(p=>p.alive),imp=alive.filter(p=>S.state.roles[p.id]?.faction==='impostor').length,inn=alive.filter(p=>S.state.roles[p.id]?.faction==='innocent').length,ser=alive.filter(p=>S.state.roles[p.id]?.role==='serial').length;if(alive.length===1&&ser)S.state.winner='連続殺人犯';else if(!imp)S.state.winner='善良陣営';else if(imp>=inn)S.state.winner='反逆陣営';if(S.state.winner){S.state.phase='end';S.state.ends=0;event(S.state.winner+'の勝利です');sync();return true}return false}
function render(){if(!S.state)return;let s=S.state,me=s.players[S.device];$('room').textContent=S.code;$('day').textContent=s.phase==='lobby'?'LOBBY':s.phase==='end'?'GAME OVER':'DAY '+s.day+' · '+s.phase.toUpperCase();$('phaseTitle').textContent={lobby:'参加者を待っています',mayor:'町長選挙',night:'夜が訪れました',dawn:'夜明け',discussion:'議論の時間',vote:'追放投票',end:(s.winner||'ゲーム')+'の勝利'}[s.phase];$('players').innerHTML=Object.values(s.players).map(p=>`<div class="player ${p.alive?'':'dead'}"><i class="dot ${p.online?'on':''}"></i><span class="name">${esc(p.name)}${p.id===S.device?'（自分）':''}</span>${p.id===s.mayor?'<span class="badge">町長</span>':''}${s.phase==='lobby'?`<span class="badge">${p.ready?'準備OK':'待機'}</span>`:p.revealed?`<span class="badge">${esc(p.revealed)}</span>`:''}</div>`).join('');$('events').innerHTML=s.events.slice().reverse().map(e=>`<div class="event">${esc(e.message)}</div>`).join('');$('lobbyBtns').classList.toggle('hidden',s.phase!=='lobby');$('ready').textContent=me?.ready?'準備を取り消す':'準備OK';renderBody(me);renderTimer()}
function roleCard(){let r=S.private;if(!r)return'<div class="notice">役職情報を待っています。</div>';let d=RD[r.role];return`<div class="rolecard ${r.faction}"><div class="eyebrow">${r.faction.toUpperCase()}</div><h3>${d[0]}</h3><p>${d[2]}</p>${r.uses<99?`<span class="badge">残り ${r.uses}回</span>`:''}${r.notes?.length?`<div class="notice">${r.notes.map(esc).join('<br>')}</div>`:''}</div>`}function targets(){return'<div class="targets">'+Object.values(S.state.players).filter(p=>p.alive&&p.id!==S.device).map(p=>`<button class="target" data-id="${p.id}">${esc(p.name)}</button>`).join('')+'</div>'}
function renderBody(me){let s=S.state;if(s.phase==='lobby'){$('body').innerHTML='<p>4〜12人。全員が準備できたら開始します。</p><div class="notice">参加者IDは端末に保存され、再接続しても増殖しません。</div>';return}if(!me?.alive){$('body').innerHTML=roleCard()+'<div class="notice">脱落しました。観戦できます。</div>';return}if(s.phase==='end'){$('body').innerHTML=`<div class="rolecard"><h3>${esc(s.winner)}の勝利</h3></div>`;return}if(s.phase==='night'){$('body').innerHTML=roleCard()+'<h3>今夜の行動</h3>'+targets();bind('action');return}if(['mayor','vote'].includes(s.phase)){$('body').innerHTML='<p>'+(s.phase==='mayor'?'町長にする人物':'追放する人物')+'を選んでください。</p>'+targets();bind('vote');return}$('body').innerHTML=roleCard()+(s.phase==='dawn'?'<div class="notice">夜の結果を確認してください。</div>':'<h3>議論してください</h3>')}
function bind(type){document.querySelectorAll('.target').forEach(b=>b.onclick=()=>{document.querySelectorAll('.target').forEach(x=>x.classList.toggle('sel',x===b));if(type==='vote')intent(S.device,{type:'vote',target:b.dataset.id});else intent(S.device,{type:'action',action:{target:b.dataset.id,mode:S.private?.faction==='impostor'?'factionKill':'use'}});toast(type==='vote'?'投票を保存しました':'夜行動を保存しました')})}function renderTimer(){let e=S.state?.ends;$('timer').textContent=e?Math.max(0,Math.ceil((e-Date.now())/1000)):'--'}
function renderRoles(){$('roleList').innerHTML=Object.entries(RD).map(([k,v])=>`<div class="roleitem"><b>${v[0]} <span class="badge">${v[1]}</span></b><small>${v[2]}</small></div>`).join('')}function renderFlow(){$('flowList').innerHTML=FLOW.map((x,i)=>`<div class="flowitem"><b>${i+1}. ${x[0]}</b><small>${x[1]}</small></div>`).join('')}
function leave(){try{S.peer?.destroy()}catch(e){}localStorage.removeItem('vt3_session');location.hash='';location.reload()}function resume(){let x=JSON.parse(localStorage.getItem('vt3_session')||'null');if(!x)return;S.code=x.code;S.secret=x.secret;S.host=!!x.host;$('name').value=x.name||'';location.hash=S.code+'.'+S.secret;open();if(S.host){let saved=JSON.parse(localStorage.getItem('vt3_host_'+S.code)||'null');if(!saved)return toast('保存された部屋がありません');S.state=saved.state;S.state.players[S.device].online=true;render();startHost()}else connectGuest()}
$('create').onclick=create;$('join').onclick=joinRoom;$('copy').onclick=async()=>{await navigator.clipboard.writeText(url());toast('招待URLをコピーしました')};$('leave').onclick=leave;$('ready').onclick=()=>intent(S.device,{type:'ready'});$('start').onclick=()=>intent(S.device,{type:'start'});document.querySelectorAll('[data-tab]').forEach(b=>b.onclick=()=>{document.querySelectorAll('[data-tab]').forEach(x=>x.classList.toggle('on',x===b));['Players','Roles','Flow'].forEach(x=>$('tab'+x).classList.toggle('hidden',x.toLowerCase()!==b.dataset.tab))});let inv=parse(location.hash.slice(1));if(inv)$('invite').value=location.href;let ses=localStorage.getItem('vt3_session');if(ses){$('resume').classList.remove('hidden');$('resume').onclick=resume}
</script></body></html>
